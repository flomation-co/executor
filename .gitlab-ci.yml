include:
  - project: 'flomation/infrastructure/ci-templates'
    ref: main
    file: '.gitlab-ci-templates.yml'

stages:
  - prepare
  - build
  - rpm-publish
  - deb-publish
  - publish
  - deploy

variables:
  VERSION: 0.0.${CI_PIPELINE_IID}
  NAME: execute
  AWS_ACCESS_KEY_ID: ${GITLAB_AWS_USER_KEY}
  AWS_SECRET_ACCESS_KEY: ${GITLAB_AWS_USER_SECRET}
  AWS_DEFAULT_REGION: eu-west-2
  DEPLOY_BUCKET: ${AWS_DEPLOYMENT_BUCKET}
  CI_TEMPLATES_PROJECT: flomation/infrastructure/ci-templates

inject-metadata:
  stage: prepare
  image: alpine:latest
  before_script:
    - apk add --no-cache jq bash
  script:
    - chmod +x scripts/inject-metadata.sh
    - bash scripts/inject-metadata.sh
    - echo "PACKAGE_NAME=$(jq -r '.package.name' project-metadata.json)" >> build.env
  artifacts:
    paths:
      - "*.spec"
      - "*.service"
      - "debian/"
    reports:
      dotenv: build.env
    expire_in: 1 hour

compile:
  stage: build
  script:
    - make build
  artifacts:
    paths:
      - ./build.zip
      - ./dist/flomation*
    expire_in: 1 hour
  cache:
    policy: push
    paths:
      - ./build.zip

build-rpm-8:
  extends: .build-rpm-template
  image: rockylinux/rockylinux:8
  variables:
    EL_VERSION: "8"
    CI_TEMPLATES_REF: "main"
    APPLICATION_BINARY: "flomation-execute-amd64-linux*"
    ARCH: x86_64
  script:
    # Set the architecture in the spec file
    - sed -i 's/{{ARCH_RPM}}/x86_64/' ${PACKAGE_NAME}.spec
    # Call the build script from the template
    - /tmp/build-rpm.sh
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}-*el8.*.rpm
    expire_in: 30 days

build-rpm-9:
  extends: .build-rpm-template
  image: rockylinux/rockylinux:9
  variables:
    EL_VERSION: "9"
    CI_TEMPLATES_REF: "main"
    APPLICATION_BINARY: "flomation-execute-amd64-linux*"
    ARCH: x86_64
  script:
    # Set the architecture in the spec file
    - sed -i 's/{{ARCH_RPM}}/x86_64/' ${PACKAGE_NAME}.spec
    # Call the build script from the template
    - /tmp/build-rpm.sh
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}-*el9.*.rpm
    expire_in: 30 days

build-rpm-8-arm64:
  extends: .build-rpm-template
  image: rockylinux/rockylinux:8
  variables:
    EL_VERSION: "8"
    CI_TEMPLATES_REF: "main"
    APPLICATION_BINARY: "flomation-execute-arm64-linux*"
    ARCH: aarch64
  script:
    # Set the architecture in the spec file
    - sed -i 's/{{ARCH_RPM}}/aarch64/' ${PACKAGE_NAME}.spec
    # Call the build script from the template
    - /tmp/build-rpm.sh
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}-*el8.aarch64.rpm
    expire_in: 30 days

build-rpm-9-arm64:
  extends: .build-rpm-template
  image: rockylinux/rockylinux:9
  variables:
    EL_VERSION: "9"
    CI_TEMPLATES_REF: "main"
    APPLICATION_BINARY: "flomation-execute-arm64-linux*"
    ARCH: aarch64
  script:
    # Set the architecture in the spec file
    - sed -i 's/{{ARCH_RPM}}/aarch64/' ${PACKAGE_NAME}.spec
    # Call the build script from the template
    - /tmp/build-rpm.sh
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}-*el9.aarch64.rpm
    expire_in: 30 days

build-deb:
  extends: .build-deb-template
  variables:
    CI_TEMPLATES_REF: "main"
    APPLICATION_BINARY: "flomation-execute-amd64-linux*"
    ARCH: amd64
  script:
    # Set the architecture in the debian control file
    - sed -i 's/{{ARCH_DEB}}/amd64/' debian/control
    # Call the build script from the template
    - /tmp/build-deb.sh
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}_*.deb
    expire_in: 30 days

build-deb-arm64:
  extends: .build-deb-template
  variables:
    CI_TEMPLATES_REF: "main"
    APPLICATION_BINARY: "flomation-execute-arm64-linux*"
    ARCH: arm64
  script:
    # Set the architecture in the debian control file
    - sed -i 's/{{ARCH_DEB}}/arm64/' debian/control
    # Call the build script from the template
    - /tmp/build-deb.sh
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}_*.deb
    expire_in: 30 days

publish:
  stage: publish
  only:
    - main
  script:
    - aws s3 cp build.zip s3://${DEPLOY_BUCKET}/${NAME}/flomation-executor-${VERSION}.zip
  cache:
    policy: pull
    paths:
      - "*.zip"

publish-rpm-8:
  extends: .publish-rpm-template
  variables:
    RPM_FILE_PATTERN: "${PACKAGE_NAME}-*el8.x86_64.rpm"
    EL_VERSION: "8"
    CI_TEMPLATES_REF: "main"
    ARCH: x86_64
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-rpm-8

publish-rpm-9:
  extends: .publish-rpm-template
  variables:
    RPM_FILE_PATTERN: "${PACKAGE_NAME}-*el9.x86_64.rpm"
    EL_VERSION: "9"
    CI_TEMPLATES_REF: "main"
    ARCH: x86_64
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-rpm-9

publish-rpm-8-arm64:
  extends: .publish-rpm-template
  variables:
    RPM_FILE_PATTERN: "${PACKAGE_NAME}-*el8.aarch64.rpm"
    EL_VERSION: "8"
    CI_TEMPLATES_REF: "main"
    ARCH: aarch64
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-rpm-8-arm64

publish-rpm-9-arm64:
  extends: .publish-rpm-template
  variables:
    RPM_FILE_PATTERN: "${PACKAGE_NAME}-*el9.aarch64.rpm"
    EL_VERSION: "9"
    CI_TEMPLATES_REF: "main"
    ARCH: aarch64
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-rpm-9-arm64

publish-deb:
  extends: .publish-deb-template
  variables:
    DEB_FILE_PATTERN: "${PACKAGE_NAME}_*_amd64.deb"
    CI_TEMPLATES_REF: "main"
    ARCH: amd64
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-deb

publish-deb-arm64:
  extends: .publish-deb-template
  variables:
    DEB_FILE_PATTERN: "${PACKAGE_NAME}_*_arm64.deb"
    CI_TEMPLATES_REF: "main"
    ARCH: arm64
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-deb-arm64

deploy-runners:
  stage: deploy
  only:
    - main
  variables:
    NAME: runner
  trigger:
    project: flomation/automate/runner